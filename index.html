<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATURAL medikdh - Tu Tienda de Bienestar</title>
    
    <link rel="icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --green-header: #123d2b; 
            --green-accent: #0e9427;  
            --gold-text: #c9a227;    
            --light-bg: #f9f9f9;     
            --text-color: #333;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--light-bg); color: var(--text-color); overflow-x: hidden; }

        header { background-color: var(--green-header); color: var(--white); padding: 15px 30px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background-color: var(--white); padding: 2px; }
        .logo h2 { font-size: 1.5rem; font-weight: 700; }
        .logo h2 span.natural { color: var(--white); }
        .logo h2 span.medikdh { color: var(--gold-text); }

        .search-container { flex: 1; max-width: 400px; margin: 0 20px; }
        .search-bar { width: 100%; padding: 12px 20px; border-radius: 25px; border: none; outline: none; font-size: 0.9rem; }

        .cart-btn { background-color: var(--green-accent); color: var(--white); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .cart-btn:hover { background-color: #0b7e21; transform: scale(1.05); }

        .main-container { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .page-title { margin-bottom: 30px; text-align: center; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .product-card { background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s ease; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #eee; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .product-image-container { width: 100%; height: 200px; margin-bottom: 15px; overflow: hidden; border-radius: 10px; }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .product-card:hover .product-image-container img { transform: scale(1.1); }
        .product-info h3 { font-size: 1.1rem; margin-bottom: 5px; color: var(--text-color); font-weight: 600; }
        .product-price { font-size: 1.2rem; color: var(--green-accent); font-weight: 700; margin-top: 5px; }

        .pagination { display: flex; justify-content: center; align-items: center; margin-top: 50px; gap: 8px; flex-wrap: wrap; }
        .page-btn { width: 40px; height: 40px; border: 1px solid #ddd; background: var(--white); cursor: pointer; border-radius: 50%; font-weight: 600; font-size: 1rem; color: var(--text-color); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .page-btn:hover:not(:disabled) { background: #eee; }
        .page-btn.active { background: #4285F4; color: var(--white); border-color: #4285F4; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* MODALES (Producto y Checkout) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--white); width: 90%; max-width: 600px; border-radius: 20px; padding: 30px; position: relative; transform: scale(0.9); transition: transform 0.3s ease; max-height: 90vh; overflow-y: auto; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.5rem; color: #aaa; cursor: pointer; }
        .close-modal:hover { color: var(--text-color); }
        
        .checkout-title { margin-bottom: 10px; color: var(--green-header); }
        .checkout-desc { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        .input-form { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; outline: none; }
        .input-form:focus { border-color: var(--green-accent); }

        .modal-body { display: flex; flex-direction: column; gap: 20px; }
        .modal-img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; }
        .modal-details { text-align: left; }
        .modal-details h2 { margin-bottom: 10px; font-weight: 700; }
        .modal-category { color: #888; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 10px; display: block;}
        .modal-price { font-size: 1.5rem; color: var(--green-accent); font-weight: 700; margin-bottom: 15px; }
        .modal-description { font-size: 0.95rem; color: #555; line-height: 1.6; margin-bottom: 20px; }
        .modal-actions { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 20px; border-top: 1px solid #eee; }
        .quantity-controls { display: flex; align-items: center; gap: 15px; border: 1px solid #eee; padding: 10px; border-radius: 30px; }
        .qty-btn-modal { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--green-accent); width: 40px; }
        .qty-val { font-size: 1.2rem; font-weight: 700; min-width: 20px; text-align: center; }
        .btn-accion { background-color: var(--green-accent); color: var(--white); border: none; padding: 15px 30px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 1rem; flex: 1; margin-left: 20px; transition: 0.3s; text-align: center; }
        .btn-accion:hover { background-color: #0b7e21; }

        /* CARRITO LATERAL */
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 400px; height: 100%; background: var(--white); box-shadow: -5px 0 25px rgba(0,0,0,0.1); z-index: 1500; transition: right 0.3s ease; display: flex; flex-direction: column; padding: 30px; }
        .cart-sidebar.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .cart-header h3 { font-size: 1.5rem; }
        .close-cart { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #aaa; }
        .cart-items-container { flex: 1; overflow-y: auto; padding-right: 10px; }
        .cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f9f9f9; }
        .cart-item-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
        .cart-item-price { color: var(--green-accent); font-weight: 600; font-size: 0.9rem; }
        .cart-item-controls { display: flex; align-items: center; gap: 5px; }
        .cart-qty-btn { background-color: #f1f1f1; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-weight: 700; color: #555; transition: 0.2s;}
        .cart-qty-btn:hover { background-color: #e5e5e5; }
        .cart-item-qty { font-weight: 700; margin: 0 5px; min-width: 15px; text-align: center;}
        .cart-footer { margin-top: auto; border-top: 1px solid #eee; padding-top: 20px; }
        .total-container { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.3rem; margin-bottom: 20px; }
        .checkout-btn { width: 100%; background-color: var(--green-accent); color: var(--white); border: none; border-radius: 8px; padding: 15px; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .checkout-btn:hover { background-color: #0b7e21; }

        /* BOTÓN FLOTANTE WHATSAPP */
        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; background-color: #25d366; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; box-shadow: 2px 2px 15px rgba(0,0,0,0.2); z-index: 1000; transition: transform 0.3s; }
        .whatsapp-float:hover { transform: scale(1.1); background-color: #128c7e; }
        .whatsapp-float img { width: 35px; height: 35px; filter: brightness(0) invert(1); }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; padding: 15px; }
            .search-container { order: 3; margin: 0; width: 100%; }
            .products-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
            <h2><span class="natural">NATURAL</span> <span class="medikdh">medikdh</span></h2>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" id="searchBar" placeholder="Buscar productos naturales...">
        </div>
        <button class="cart-btn" onclick="toggleCart()">
            🛒 Tu Carrito (<span id="cartCount">0</span>)
        </button>
    </header>

    <div class="main-container">
        <h1 class="page-title">Explora Nuestros Productos</h1>
        <div class="products-grid" id="productsGrid"></div>
        <div class="pagination" id="paginationContainer"></div>
    </div>

    <div class="modal-overlay" id="productModal" onclick="closeModalExterno(event, 'productModal')">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('productModal')">✖</button>
            <div class="modal-body">
                <img src="" alt="Producto" class="modal-img" id="modalImage">
                <div class="modal-details">
                    <span class="modal-category" id="modalCategory"></span>
                    <h2 id="modalName"></h2>
                    <p class="modal-price" id="modalPrice"></p>
                    <p class="modal-description" id="modalDescription"></p>
                </div>
                <div class="modal-actions">
                    <div class="quantity-controls">
                        <button class="qty-btn-modal" onclick="modifyModalQty(-1)">-</button>
                        <span class="qty-val" id="modalQty">1</span>
                        <button class="qty-btn-modal" onclick="modifyModalQty(1)">+</button>
                    </div>
                    <button class="btn-accion" id="modalAddButton">Añadir al pedido</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="checkoutModal" onclick="closeModalExterno(event, 'checkoutModal')">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <button class="close-modal" onclick="closeModal('checkoutModal')">✖</button>
            <h2 class="checkout-title">Casi listo...</h2>
            <p class="checkout-desc">Déjanos tus datos para enviarle tu pedido a nuestro asesor por WhatsApp.</p>
            
            <input type="text" id="clienteNombre" class="input-form" placeholder="Tu Nombre">
            <input type="text" id="clienteCiudad" class="input-form" placeholder="Ej: Cali, Valle del Cauca">
            
            <button class="btn-accion" style="width: 100%; margin-left: 0; margin-top: 10px;" onclick="enviarPedidoWhatsApp()">Enviar a WhatsApp 📲</button>
        </div>
    </div>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Carrito</h3>
            <button class="close-cart" onclick="toggleCart()">➡️</button>
        </div>
        <div class="cart-items-container" id="cartItemsList"></div>
        <div class="cart-footer">
            <div class="total-container">
                <span>Total:</span>
                <span id="cartTotal">$0.000</span>
            </div>
            <button class="checkout-btn" onclick="abrirCheckout()">Finalizar Pedido</button>
        </div>
    </div>

    <a href="https://wa.me/573150674848" class="whatsapp-float" target="_blank" title="Contáctanos por WhatsApp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <script>
        // Para WA
        const MI_NUMERO_WHATSAPP = "573150674848"; 

        function formatCOP(amount) {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(amount);
        }

        let productsDatabase = [];
        function addRealProduct(id, imgName, name, category, price, description) {
            productsDatabase.push({ id, img: `jpeg/${imgName}`, name, category, price, description });
        }

        // --- Descripción de Productos ---
        addRealProduct(1, 'prod1.jpeg', 'Gomitas Manzana Satibo', 'Vitaminas', 45500, 'Te presentamos unas deliciosas gomitas con vinagre de manzana que mejoran tu digestión diaria. Te recomendamos tomar dos al día después de tus comidas.');
        addRealProduct(2, 'prod2.jpeg', 'Cúrcuma + Pimienta Negra', 'Cuidado Personal', 60000, 'Es un fuerte antiinflamatorio y antioxidante natural, ideal para aliviar dolores articulares, mejorar la digestión, fortalecer el sistema inmunológico y reducir el estrés oxidativo.');
        addRealProduct(3, 'prod3.jpeg', 'Magnesio + Potasio', 'General', 43000, 'Sirve para mejorar la función muscular, reducir calambres y fatiga, y favorecer la salud cardiovascular.');
        addRealProduct(4, 'prod4.jpeg', 'Cardo Mariano', 'Digestión', 60000, 'Ayuda a proteger  y regenerar el hígado. Para afecciones hepáticas y además mejora la disgestión pesada y reducir el colesterol');
        addRealProduct(5, 'prod5.jpeg', 'Ashwagandha', 'Estrés', 55000, 'Es un adaptógeno que ayuda a reducir el estrés, mejorar la calidad del sueño y aumentar la energía.');
        addRealProduct(6, 'prod6.jpeg', 'Citrato de Magnesio', 'General', 40000, 'Es un suplemento que ayuda a mejorar la función muscular, reducir calambres y fatiga, y favorecer la salud cardiovascular.');
        addRealProduct(7, 'prod7.jpeg', 'Verde con Aloe Vera', 'Digestión', 48000, 'Es un suplemento que ayuda a mejorar la digestión, aliviar el estreñimiento y promover la salud intestinal gracias a su combinación de ingredientes naturales como el aloe vera y el jugo de pasto de trigo.');
        addRealProduct(8, 'prod8.jpeg', 'VID C+ Calostro', 'Vitaminas', 52000, 'Es un suplemento que combina vitamina C para fortalecer el sistema inmunológico y calostro bovino para proporcionar anticuerpos y nutrientes esenciales que apoyan la salud general.');
        addRealProduct(9, 'prod9.jpeg', 'DURON', 'Energía', 45000, 'Es un suplemento que ayuda a mejorar la energía, aumentar la resistencia física y promover el bienestar general gracias a su combinación de ingredientes naturales como la maca, el ginseng y la vitamina B12.');
        addRealProduct(10, 'prod10.jpeg', 'Malteada Satisure', 'General', 55000, 'Es un suplemento nutricional en forma de malteada que proporciona una combinación equilibrada de proteínas, carbohidratos, vitaminas y minerales para apoyar la nutrición diaria y promover la salud general.');
        addRealProduct(11, 'prod11.jpeg', 'EPA-DHA Omega 3', 'Cuidado Personal', 65000, 'Es un suplemento que proporciona ácidos grasos esenciales EPA y DHA, que ayudan a mejorar la salud cardiovascular, reducir la inflamación y apoyar la función cerebral.');
        addRealProduct(12, 'prod12.jpeg', 'Propolfin Kids', 'Vitaminas', 40000, 'Es un suplemento diseñado para niños que combina propóleo, vitamina C y zinc para fortalecer el sistema inmunológico, proteger contra resfriados y promover la salud general de los más pequeños.');
        addRealProduct(13, 'prod13.jpeg', 'Propolfin Adultos', 'Vitaminas', 45000, 'Es un suplemento que combina propóleo, vitamina C y zinc para fortalecer el sistema inmunológico, proteger contra resfriados y promover la salud general en adultos.');
        addRealProduct(14, 'prod14.jpeg', 'Collagen & Biotin Plus', 'Cuidado Personal', 60000, 'Es un suplemento que combina colágeno hidrolizado y biotina para mejorar la salud de la piel, fortalecer el cabello y las uñas, y promover la elasticidad y firmeza de la piel.');
        addRealProduct(15, 'prod15.jpeg', 'Complex Plus Children', 'Vitaminas', 48000, 'Es un suplemento multivitamínico diseñado para niños que proporciona una combinación equilibrada de vitaminas y minerales esenciales para apoyar el crecimiento, el desarrollo y la salud general de los más pequeños.');
        addRealProduct(16, 'prod16.jpeg', 'D3', 'Vitaminas', 40000, 'Es un suplemento de vitamina D3 que ayuda a fortalecer los huesos, mejorar la función inmunológica y promover la salud general al facilitar la absorción de calcio en el cuerpo.');
        addRealProduct(17, 'prod17.jpeg', 'Complex Plus Adultos', 'Vitaminas', 55000, 'Es un suplemento multivitamínico diseñado para adultos que proporciona una combinación equilibrada de vitaminas y minerales esenciales para apoyar la salud general, mejorar la energía y fortalecer el sistema inmunológico.');
        addRealProduct(18, 'prod18.jpeg', 'Colágeno Hidrolizado', 'Cuidado Personal', 50000, 'Es un suplemento de colágeno hidrolizado que ayuda a mejorar la salud de la piel, fortalecer el cabello y las uñas, y promover la elasticidad y firmeza de la piel gracias a su alta absorción.');




        let currentPage = 1;
        const itemsPerPage = 12; 
        let currentFilteredProducts = productsDatabase;

        const productsGrid = document.getElementById('productsGrid');
        const paginationContainer = document.getElementById('paginationContainer');
        const searchBar = document.getElementById('searchBar');

        function renderProducts() {
            productsGrid.innerHTML = ''; 
            if (currentFilteredProducts.length === 0) {
                productsGrid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1;">No encontramos productos con ese nombre.</p>';
                paginationContainer.innerHTML = ''; return;
            }
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const productsToShow = currentFilteredProducts.slice(startIndex, endIndex);

            productsToShow.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openModal(p.id);
                card.innerHTML = `<div class="product-image-container"><img src="${p.img}" alt="${p.name}" onerror="this.src='logo.png';"></div><div class="product-info"><h3>${p.name}</h3><p class="product-price">${formatCOP(p.price)}</p></div>`;
                productsGrid.appendChild(card);
            });
            renderPagination();
        }

        function renderPagination() {
            paginationContainer.innerHTML = '';
            const totalPages = Math.ceil(currentFilteredProducts.length / itemsPerPage);
            if (totalPages <= 1) return; 

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn'; prevBtn.innerHTML = '←'; prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { currentPage--; renderProducts(); };
            paginationContainer.appendChild(prevBtn);

            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            for(let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i; btn.onclick = () => { currentPage = i; renderProducts(); };
                paginationContainer.appendChild(btn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn'; nextBtn.innerHTML = '→'; nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { currentPage++; renderProducts(); };
            paginationContainer.appendChild(nextBtn);
        }

        searchBar.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            currentFilteredProducts = productsDatabase.filter(p => p.name.toLowerCase().includes(searchTerm));
            currentPage = 1; renderProducts();
        });

        // Modal y Carrito
        let currentModalQty = 1;
        let selectedProductModal = null;
        let cartItems = [];

        function openModal(id) {
            const p = productsDatabase.find(x => x.id === id);
            selectedProductModal = p; currentModalQty = 1;
            document.getElementById('modalImage').src = p.img;
            document.getElementById('modalCategory').textContent = p.category;
            document.getElementById('modalName').textContent = p.name;
            document.getElementById('modalPrice').textContent = formatCOP(p.price);
            document.getElementById('modalDescription').textContent = p.description;
            document.getElementById('modalQty').textContent = currentModalQty;
            document.getElementById('modalAddButton').onclick = () => { addToCart(p, currentModalQty); closeModal('productModal'); };
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); document.body.style.overflow = ''; }
        function closeModalExterno(e, modalId) { if (e.target === document.getElementById(modalId)) closeModal(modalId); }
        function modifyModalQty(v) { currentModalQty += v; if(currentModalQty<1) currentModalQty=1; document.getElementById('modalQty').textContent = currentModalQty; }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }

        function addToCart(product, qty) {
            const item = cartItems.find(i => i.id === product.id);
            if (item) item.qty += qty; else cartItems.push({ ...product, qty });
            updateCart();
        }

        function changeCartQty(id, v) {
            const item = cartItems.find(i => i.id === id);
            if (!item) return;
            item.qty += v; if (item.qty < 1) cartItems = cartItems.filter(i => i.id !== id);
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartItemsList');
            list.innerHTML = ''; let total = 0, count = 0;

            cartItems.forEach(item => {
                total += item.price * item.qty; count += item.qty;
                const div = document.createElement('div'); div.className = 'cart-item';
                div.innerHTML = `<img src="${item.img}" class="cart-item-img" onerror="this.src='logo.png';"><div class="cart-item-info"><div class="cart-item-name">${item.name}</div><div class="cart-item-price">${formatCOP(item.price)}</div></div><div class="cart-item-controls"><button class="cart-qty-btn" onclick="changeCartQty(${item.id}, -1)">-</button><span class="cart-item-qty">${item.qty}</span><button class="cart-qty-btn" onclick="changeCartQty(${item.id}, 1)">+</button></div>`;
                list.appendChild(div);
            });
            document.getElementById('cartTotal').textContent = formatCOP(total);
            document.getElementById('cartCount').textContent = count;
        }

        // WhatsApp Checkout
        function abrirCheckout() {
            if (cartItems.length === 0) {
                alert("Tu carrito está vacío. ¡Agrega algunos productos primero!");
                return;
            }
            toggleCart(); 
            document.getElementById('checkoutModal').classList.add('active'); 
        }

        function enviarPedidoWhatsApp() {
            const nombre = document.getElementById('clienteNombre').value.trim();
            const ciudad = document.getElementById('clienteCiudad').value.trim();

            if (!nombre || !ciudad) {
                alert("Por favor, llena tu nombre y ciudad para continuar.");
                return;
            }

            let mensaje = `Hola soy *${nombre}* de la ciudad de *${ciudad}*, interesad@ en el siguiente pedido:\n\n`;
            let total = 0;

            cartItems.forEach(item => {
                mensaje += `🔸 ${item.qty}x ${item.name} (${formatCOP(item.price * item.qty)})\n`;
                total += item.price * item.qty;
            });

            mensaje += `\n💰 *Total del pedido: ${formatCOP(total)}*`;

            const textoCodificado = encodeURIComponent(mensaje);
            const urlWhatsApp = `https://wa.me/${MI_NUMERO_WHATSAPP}?text=${textoCodificado}`;
            window.open(urlWhatsApp, '_blank');

            closeModal('checkoutModal');
            cartItems = []; 
            updateCart();
            document.getElementById('clienteNombre').value = '';
            document.getElementById('clienteCiudad').value = '';
        }

        renderProducts();
    </script>
</body>
</html>
