<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATURAL medikdh - Tu Tienda de Bienestar</title>

    <link rel="icon" type="image/png" href="minilogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --green-header: #123d2b; 
            --green-accent: #0e9427;  
            --gold-text: #c9a227;    
            --light-bg: #f9f9f9;     
            --text-color: #333;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--light-bg); color: var(--text-color); overflow-x: hidden; }

        header { background-color: var(--green-header); color: var(--white); padding: 15px 30px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: white; padding: 2px; }
        .user-greeting { font-size: 0.85rem; color: var(--gold-text); font-weight: 600; }

        .search-container { flex: 1; max-width: 400px; margin: 0 20px; }
        .search-bar { width: 100%; padding: 10px 20px; border-radius: 25px; border: none; outline: none; font-size: 0.9rem; }

        .cart-btn { background-color: var(--green-accent); color: var(--white); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        
        /* BARRAS LATERALES */
        .sidebar { position: fixed; top: 0; width: 350px; height: 100%; background: var(--white); z-index: 1500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; box-shadow: 0 0 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .sidebar-right { right: -350px; }
        .sidebar-right.active { right: 0; }
        .sidebar-left { left: -350px; }
        .sidebar-left.active { left: 0; }

        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* CATEGORÍAS */
        .categories-container { background: white; padding: 12px 0; border-bottom: 1px solid #eee; position: sticky; top: 85px; z-index: 900; display: flex; justify-content: center; gap: 10px; overflow-x: auto; padding-left: 20px; padding-right: 20px; }
        .category-pill { padding: 8px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.3s; white-space: nowrap; }
        .category-pill.active { background: var(--green-accent); color: white; border-color: var(--green-accent); }

        .main-container { padding: 30px 20px; max-width: 1200px; margin: 0 auto; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; }
        
        .product-card { background: var(--white); border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid #f0f0f0; display: flex; flex-direction: column; height: 100%; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .product-img-box { width: 100%; height: 200px; overflow: hidden; border-radius: 10px; margin-bottom: 12px; }
        .product-img-box img { width: 100%; height: 100%; object-fit: contain; }

        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--white); width: 100%; max-width: 480px; border-radius: 20px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-image { width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 15px; border-radius: 10px; background: #fafafa; }

        .input-form { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.9rem; outline: none; margin-bottom: 10px; }

        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; background: var(--green-accent); color: white; }
        .btn-outline { width: 100%; padding: 10px; border: 1px solid #ff4d4d; color: #ff4d4d; border-radius: 10px; background: none; font-weight: 600; cursor: pointer; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 30px; font-size: 0.9rem; z-index: 3000; display: none; }

        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .whatsapp-float img { width: 32px; filter: brightness(0) invert(1); }

        @media (max-width: 768px) {
            header { padding: 15px; }
            .sidebar { width: 100%; }
            .categories-container { top: 130px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area" onclick="toggleSidebar('userSidebar')">
            <img src="logo.png" alt="Logo">
            <div>
                <h2 style="font-size: 1.1rem;"><span style="color:white;">NATURAL</span> <span style="color:var(--gold-text);">medikdh</span></h2>
                <p id="headerGreeting" class="user-greeting">Hola, Invitado</p>
            </div>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" id="searchBar" placeholder="¿Qué necesitas hoy?">
        </div>
        <button class="cart-btn" onclick="toggleSidebar('cartSidebar')">
            🛒 Carrito (<span id="cartCount">0</span>)
        </button>
    </header>

    <div class="categories-container">
        <button class="category-pill active" onclick="filterCat('Todas')">Todas</button>
        <button class="category-pill" onclick="filterCat('Vitaminas')">Vitaminas</button>
        <button class="category-pill" onclick="filterCat('Digestión')">Digestión</button>
        <button class="category-pill" onclick="filterCat('General')">General</button>
        <button class="category-pill" onclick="filterCat('Cuidado Personal')">Cuidado Personal</button>
        <button class="category-pill" onclick="filterCat('Energía')">Energía</button>
    </div>

    <div class="main-container">
        <div class="products-grid" id="productsGrid"></div>
        <div id="paginationContainer" style="display:flex; justify-content:center; gap:10px; margin-top:30px;"></div>
    </div>

    <div class="sidebar sidebar-left" id="userSidebar">
        <div class="sidebar-header">
            <h3>Mi Perfil</h3>
            <button onclick="toggleSidebar('userSidebar')" style="border:none; background:none; font-size:1.5rem;">✕</button>
        </div>
        <div id="userForm">
            <input type="text" id="uNombre" class="input-form" placeholder="Tu nombre completo">
            <input type="text" id="uCiudad" class="input-form" placeholder="Ciudad">
            <input type="text" id="uBarrio" class="input-form" placeholder="Barrio">
            <input type="text" id="uDireccion" class="input-form" placeholder="Dirección">
            <button class="btn-main" onclick="saveUser()">Guardar Datos</button>
        </div>
        <div id="userDisplay" style="display:none; text-align:center;">
            <p id="displayNombre" style="font-size:1.2rem; font-weight:600; margin-bottom:20px;"></p>
            <button class="btn-outline" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="sidebar sidebar-right" id="cartSidebar">
        <div class="sidebar-header">
            <h3>Mi Carrito</h3>
            <button onclick="toggleSidebar('cartSidebar')" style="border:none; background:none; font-size:1.5rem;">✕</button>
        </div>
        <div id="cartList" style="flex:1; overflow-y:auto;"></div>
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-weight:700; margin-bottom:20px;">
                <span>Total:</span> <span id="cartTotal">$0</span>
            </div>
            <button class="btn-outline" onclick="clearCart()" style="margin-bottom:10px;">Vaciar</button>
            <button class="btn-main" onclick="goCheckout()">Pedir por WhatsApp</button>
        </div>
    </div>

    <div class="modal-overlay" id="pModal" onclick="closeModalExt(event, 'pModal')">
        <div class="modal-content">
            <button onclick="closeM('pModal')" style="position:absolute; top:15px; right:15px; border:none; background:#eee; width:30px; height:30px; border-radius:50%; cursor:pointer;">✕</button>
            <img src="" id="mImg" class="modal-image">
            <h2 id="mName"></h2>
            <p id="mPrice" style="color:var(--green-accent); font-size:1.6rem; font-weight:700; margin:10px 0;"></p>
            <p id="mDesc" style="font-size:0.9rem; color:#555; line-height:1.5; margin-bottom:20px;"></p>
            <button id="mAddBtn" class="btn-main">Añadir al pedido</button>
        </div>
    </div>

    <div class="modal-overlay" id="checkModal" onclick="closeModalExt(event, 'checkModal')">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">Datos de Envío</h2>
            <input type="text" id="cN" class="input-form" placeholder="Nombre">
            <input type="text" id="cC" class="input-form" placeholder="Ciudad">
            <input type="text" id="cB" class="input-form" placeholder="Barrio">
            <input type="text" id="cD" class="input-form" placeholder="Dirección">
            <select id="cP" class="input-form">
                <option value="Nequi">Nequi</option>
                <option value="Daviplata">Daviplata</option>
                <option value="Efectivo">Efectivo</option>
            </select>
            <button class="btn-main" onclick="sendWA()">Confirmar Pedido 📲</button>
        </div>
    </div>

    <div id="toast"></div>

    <a href="https://wa.me/573150674848" class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
    </a>

    <script>
        const WA_NUMBER = "573150674848";
        const fmt = n => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(n);

        let products = [];

        add(3, 'prod3.jpeg', 'Magnesio + Potasio', 'General', 43000, 'Función muscular.');
        add(4, 'prod4.jpeg', 'Cardo Mariano', 'Digestión', 60000, 'Protege el hígado.');
        add(5, 'prod5.jpeg', 'Ashwagandha', 'Estrés', 55000, 'Reduce estrés.');
        add(6, 'prod6.jpeg', 'Citrato Magnesio', 'General', 40000, 'Salud muscular.');
        add(7, 'prod7.jpeg', 'Verde Aloe Vera', 'Digestión', 48000, 'Salud intestinal.');
        add(8, 'prod8.jpeg', 'VID C+ Calostro', 'Vitaminas', 52000, 'Inmunidad.');
        add(9, 'prod9.jpeg', 'DURON', 'Energía', 45000, 'Resistencia física.');
        add(10, 'prod10.jpeg', 'Malteada Satisure', 'General', 55000, 'Nutrición diaria.');
        add(11, 'prod11.jpeg', 'EPA-DHA Omega 3', 'Cuidado Personal', 65000, 'Salud cardiovascular.');
        add(12, 'prod12.jpeg', 'Propolfin Kids', 'Vitaminas', 40000, 'Protección niños.');
        add(13, 'prod13.jpeg', 'Propolfin Adultos', 'Vitaminas', 45000, 'Defensas adultos.');
        add(14, 'prod14.jpeg', 'Collagen Biotin', 'Cuidado Personal', 60000, 'Piel y uñas.');
        add(15, 'prod15.jpeg', 'Complex Children', 'Vitaminas', 48000, 'Multivitamínico infantil.');
        add(16, 'prod16.jpeg', 'Vitamina D3', 'Vitaminas', 40000, 'Huesos fuertes.');
        add(17, 'prod17.jpeg', 'Complex Adultos', 'Vitaminas', 55000, 'Energía adultos.');
        add(18, 'prod18.jpeg', 'Colágeno Hidrolizado', 'Cuidado Personal', 50000, 'Firmeza piel.');
        add(19, 'prod19.jpeg', 'PlaXavil', 'Vitaminas', 45000, 'Refuerzo inmune.');
        add(20, 'prod20.jpeg', 'Vinu-CR-Brl', 'Vitaminas', 50000, 'Vitamina C y Zinc.');
        add(21, 'prod21.jpeg', 'Torvitol', 'General', 55000, 'Antioxidantes.');
        add(22, 'prod22.jpeg', 'Almendras D3 Calcio', 'Cuidado Personal', 48000, 'Salud ósea.');
        add(23, 'prod23.jpeg', 'Binergy Biopronat', 'General', 60000, 'Probióticos.');
        add(24, 'prod24.jpeg', 'Bio XL-S', 'General', 55000, 'Metabolismo.');
        add(25, 'prod25.jpeg', '18 Raics', 'General', 65000, 'Fórmula natural.');
        add(26, 'prod26.jpeg', 'Plus Aguaje', 'General', 50000, 'Bienestar mujer.');
        add(27, 'prod27.jpeg', 'AntRitico', 'General', 45000, 'Dolor articular.');
        add(28, 'prod28.jpeg', 'Biloying', 'General', 55000, 'Vitalidad.');
        add(29, 'prod29.jpeg', 'Bililax', 'General', 50000, 'Regularidad.');
        add(30, 'prod30.jpeg', 'Calci D', 'General', 40000, 'Calcio.');
        add(31, 'prod31.jpeg', 'ResVeratol', 'General', 60000, 'Antienvejecimiento.');
        add(32, 'prod32.jpeg', 'Chanca Piedra', 'General', 45000, 'Salud renal.');
        add(33, 'prod33.jpeg', 'Citrato Magnesio Pura', 'General', 40000, 'Magnesio.');
        add(34, 'prod34.jpeg', 'Clormag', 'General', 45000, 'Cloruro magnesio.');
        add(35, 'prod35.jpeg', 'Clorofila', 'General', 40000, 'Desintoxicante.');
        add(36, 'prod36.jpeg', 'ColahenVit', 'Cuidado Personal', 50000, 'Colágeno.');
        add(37, 'prod37.jpeg', 'Colágeno Marino', 'Cuidado Personal', 55000, 'Origen marino.');
        add(38, 'prod38.jpeg', 'Fenogreco', 'General', 45000, 'Apoyo digestivo.');
        add(39, 'prod39.jpeg', 'Fosbril', 'General', 50000, 'Fósforo.');
        add(40, 'prod40.jpeg', 'Glucosartrim', 'General', 79000, 'Movilidad.');
        add(41, 'prod41.jpeg', 'Maca Negra Roja', 'General', 45000, 'Energizante.');
        add(42, 'prod42.jpeg', 'HEGLB-Max', 'General', 55000, 'Hemoglobina.');
        add(43, 'prod43.jpeg', 'Komp - B', 'General', 50000, 'Complejo B.');
        add(44, 'prod44.jpeg', 'NAT Resveratrol', 'General', 60000, 'Salud celular.');
        add(45, 'prod45.jpeg', 'Oirculen', 'General', 45000, 'Circulación.');
        add(46, 'prod46.jpeg', 'Proshom', 'General', 55000, 'Hombre.');
        add(47, 'prod47.jpeg', 'Ptenciol', 'General', 50000, 'Vitalidad.');
        add(48, 'prod48.jpeg', 'Ashwagandha D3', 'General', 60000, 'Huesos.');
        add(49, 'prod49.jpeg', 'Arthro Patique', 'General', 45000, 'Articulaciones.');
        add(50, 'prod50.jpeg', 'Cardomarin', 'General', 55000, 'Hígado.');
        add(51, 'prod51.jpeg', 'Echinacea D3', 'General', 50000, 'Inmunidad.');
        add(52, 'prod52.jpeg', 'Enzydophilus', 'General', 45000, 'Enzimas.');
        add(53, 'prod53.jpeg', 'Ginkgo Biloba D3', 'General', 55000, 'Memoria.');
        add(54, 'prod54.jpeg', 'Melatonina D3', 'General', 50000, 'Descanso.');
        add(55, 'prod55.jpeg', 'Phyllanthus', 'General', 45000, 'Riñones.');
        add(56, 'prod56.jpeg', 'Saw Palmetto D3', 'General', 55000, 'Próstata.');
        add(57, 'prod57.jpeg', 'Alcachofa Compuesta', 'General', 50000, 'Depurativo.');
        add(58, 'prod58.jpeg', 'Arándano', 'General', 45000, 'Antioxidante.');
        add(59, 'prod59.jpeg', 'Biotina Magnesio', 'General', 55000, 'Cabello.');
        add(60, 'prod60.jpeg', 'Macasource', 'General', 45000, 'Energía.');
        add(61, 'prod61.jpeg', 'Melatonina', 'General', 50000, 'Sueño.');
        add(62, 'prod62.jpeg', 'HEPANAT', 'General', 60000, 'Salud hígado.');

        let cart = JSON.parse(localStorage.getItem('nm_cart')) || [];
        let user = JSON.parse(localStorage.getItem('nm_user')) || null;
        let curFilter = 'Todas', curPage = 1, perPage = 12;

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2500); }

        function render() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            let filtered = curFilter === 'Todas' ? products : products.filter(p => p.cat === curFilter);
            const search = document.getElementById('searchBar').value.toLowerCase();
            filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
            
            const start = (curPage - 1) * perPage;
            filtered.slice(start, start + perPage).forEach(p => {
                const d = document.createElement('div');
                d.className = 'product-card';
                d.onclick = () => openP(p);
                d.innerHTML = `<div class="product-img-box"><img src="${p.img}" onerror="this.src='logo.png'"></div><h3>${p.name}</h3><p style="color:var(--green-accent);font-weight:700;">${fmt(p.price)}</p>`;
                grid.appendChild(d);
            });
            renderPager(filtered.length);
        }

        function renderPager(total) {
            const cont = document.getElementById('paginationContainer'); cont.innerHTML = '';
            const pages = Math.ceil(total / perPage);
            if(pages <= 1) return;
            for(let i=1; i<=pages; i++) {
                const b = document.createElement('button');
                b.style = `padding:8px 15px; border-radius:50%; border:1px solid #ddd; background:${i===curPage?'#0e9427':'white'}; color:${i===curPage?'white':'black'}; cursor:pointer;`;
                b.innerText = i; b.onclick = () => { curPage = i; render(); window.scrollTo(0,0); };
                cont.appendChild(b);
            }
        }

        function filterCat(c) {
            curFilter = c; curPage = 1;
            document.querySelectorAll('.category-pill').forEach(b => b.classList.toggle('active', b.innerText === c));
            render();
        }

        document.getElementById('searchBar').addEventListener('input', () => { curPage = 1; render(); });

        function saveUser() {
            const d = { n: document.getElementById('uNombre').value, c: document.getElementById('uCiudad').value, b: document.getElementById('uBarrio').value, d: document.getElementById('uDireccion').value };
            if(!d.n) return alert("Dinos tu nombre");
            localStorage.setItem('nm_user', JSON.stringify(d));
            user = d; initUser(); showToast("¡Datos guardados!"); toggleSidebar('userSidebar');
        }
        function initUser() {
            if(user) {
                document.getElementById('headerGreeting').innerText = `Hola, ${user.n.split(' ')[0]}`;
                document.getElementById('userForm').style.display = 'none';
                document.getElementById('userDisplay').style.display = 'block';
                document.getElementById('displayNombre').innerText = user.n;
            } else {
                document.getElementById('headerGreeting').innerText = `Hola, Invitado`;
                document.getElementById('userForm').style.display = 'block';
                document.getElementById('userDisplay').style.display = 'none';
            }
        }
        function logout() { localStorage.removeItem('nm_user'); user = null; initUser(); toggleSidebar('userSidebar'); }

        function sync() { localStorage.setItem('nm_cart', JSON.stringify(cart)); updateUI(); }
        function updateUI() {
            const list = document.getElementById('cartList'); list.innerHTML = '';
            let total = 0, count = 0;
            cart.forEach(i => {
                total += (i.price * i.qty); count += i.qty;
                const d = document.createElement('div'); d.style="display:flex;gap:10px;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:10px;";
                d.innerHTML = `<img src="${i.img}" style="width:40px;height:40px;"> <div style="flex:1;"><strong>${i.name}</strong><br>${fmt(i.price)}</div> <div><button onclick="chQty(${i.id},-1)">-</button> ${i.qty} <button onclick="chQty(${i.id},1)">+</button></div>`;
                list.appendChild(d);
            });
            document.getElementById('cartTotal').innerText = fmt(total);
            document.getElementById('cartCount').innerText = count;
        }
        function addToCart(p, q) {
            const ex = cart.find(i => i.id === p.id);
            if(ex) ex.qty += q; else cart.push({...p, qty: q});
            sync(); showToast("¡Añadido!");
        }
        function chQty(id, v) {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty += v; if(i.qty < 1) cart = cart.filter(x => x.id !== id); sync(); }
        }
        function clearCart() { if(confirm("¿Vaciar?")) { cart = []; sync(); } }

        function openP(p) {
            document.getElementById('mImg').src = p.img;
            document.getElementById('mName').innerText = p.name;
            document.getElementById('mPrice').innerText = fmt(p.price);
            document.getElementById('mDesc').innerText = p.desc;
            document.getElementById('mAddBtn').onclick = () => { addToCart(p, 1); closeM('pModal'); };
            document.getElementById('pModal').classList.add('active');
        }
        function toggleSidebar(id) { document.getElementById(id).classList.toggle('active'); }
        function closeM(id) { document.getElementById(id).classList.remove('active'); }
        function closeModalExt(e, id) { if(e.target.id === id) closeM(id); }

        function goCheckout() {
            if(cart.length === 0) return;
            toggleSidebar('cartSidebar');
            if(user) {
                document.getElementById('cN').value = user.n; document.getElementById('cC').value = user.c;
                document.getElementById('cB').value = user.b; document.getElementById('cD').value = user.d;
            }
            document.getElementById('checkModal').classList.add('active');
        }

        function sendWA() {
            const n = document.getElementById('cN').value, c = document.getElementById('cC').value, 
                  b = document.getElementById('cB').value, d = document.getElementById('cD').value, p = document.getElementById('cP').value;
            if(!n || !c || !d) return alert("Completa los datos");
            let m = "*PEDIDO NATURAL MEDIKDH*\n\n*Cliente:* " + n + "\n*Ciudad:* " + c + "\n*Barrio:* " + b + "\n*Direccion:* " + d + "\n*Pago:* " + p + "\n\n*PRODUCTOS:*\n";
            let total = 0;
            cart.forEach(i => { m += "- " + i.qty + "x " + i.name + " (" + fmt(i.price*i.qty) + ")\n"; total += (i.price*i.qty); });
            m += "\n*TOTAL: " + fmt(total) + "*";
            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(m)}`, '_blank');
            cart = []; sync(); closeM('checkModal');
        }

        render(); initUser(); updateUI();
    </script>
</body>
</html>
